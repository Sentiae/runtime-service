syntax = "proto3";

package runtime.v1;

option go_package = "github.com/sentiae/runtime-service/gen/proto/runtime/v1;runtimev1";

// RuntimeService provides code execution + test-run management inside
// Firecracker microVMs.
//
// The original CreateExecution/GetExecution/ListExecutions/CancelExecution/
// GetExecutionMetrics surface is preserved for existing callers. Task
// "Expose gRPC on canvas-service and runtime-service" adds the caller-
// friendlier Execute*/GetExecution{Status,Result}/DispatchTestRun/
// GetTestCoverage*/GetVMUsage RPCs used by foundry-service, canvas-service,
// and ops-service.
service RuntimeService {
    // ── Legacy execution API ───────────────────────────────────────────
    rpc CreateExecution(CreateExecutionRequest) returns (CreateExecutionResponse);
    rpc GetExecution(GetExecutionRequest) returns (GetExecutionResponse);
    rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
    rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse);
    rpc GetExecutionMetrics(GetExecutionMetricsRequest) returns (GetExecutionMetricsResponse);

    // ── Convenience execution API (task) ───────────────────────────────
    // Execute runs code synchronously inside a Firecracker VM and returns
    // the completed execution. Used by canvas run-code-from-node.
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);
    // ExecuteAsync enqueues an execution and returns an opaque job_id
    // the caller polls with GetExecutionStatus / GetExecutionResult.
    rpc ExecuteAsync(ExecuteRequest) returns (ExecuteAsyncResponse);
    // GetExecutionStatus returns the lifecycle status + timestamps.
    rpc GetExecutionStatus(GetExecutionStatusRequest) returns (GetExecutionStatusResponse);
    // GetExecutionResult returns the completed stdout/stderr/exit_code.
    rpc GetExecutionResult(GetExecutionResultRequest) returns (GetExecutionResultResponse);

    // ── Test-run dispatch + coverage ───────────────────────────────────
    rpc DispatchTestRun(DispatchTestRunRequest) returns (TestRunHandle);
    rpc GetTestCoverage(GetTestCoverageRequest) returns (TestCoverage);
    rpc GetTestCoverageDelta(GetTestCoverageDeltaRequest) returns (TestCoverageDelta);

    // ── VM usage (session cost preview) ────────────────────────────────
    rpc GetVMUsage(GetVMUsageRequest) returns (VMUsage);
}

// ─────────────────────────────────────────────────────────────────────
// Legacy execution messages (unchanged).
// ─────────────────────────────────────────────────────────────────────

message CreateExecutionRequest {
    string organization_id = 1;
    string requested_by = 2;
    string language = 3;
    string code = 4;
    string stdin = 5;
    int32 vcpu = 6;
    int32 memory_mb = 7;
    int32 timeout_sec = 8;
}

message CreateExecutionResponse {
    Execution execution = 1;
}

message GetExecutionRequest {
    string id = 1;
}

message GetExecutionResponse {
    Execution execution = 1;
}

message ListExecutionsRequest {
    string organization_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ListExecutionsResponse {
    repeated Execution executions = 1;
    int32 total = 2;
}

message CancelExecutionRequest {
    string id = 1;
}

message CancelExecutionResponse {
    bool success = 1;
}

message GetExecutionMetricsRequest {
    string execution_id = 1;
}

message GetExecutionMetricsResponse {
    ExecutionMetrics metrics = 1;
}

message Execution {
    string id = 1;
    string organization_id = 2;
    string requested_by = 3;
    string language = 4;
    string code = 5;
    string stdin = 6;
    string status = 7;
    int32 exit_code = 8;
    string stdout = 9;
    string stderr = 10;
    string error = 11;
    int32 vcpu = 12;
    int32 memory_mb = 13;
    int32 timeout_sec = 14;
    int64 duration_ms = 15;
    string created_at = 16;
    string started_at = 17;
    string completed_at = 18;
}

message ExecutionMetrics {
    string id = 1;
    string execution_id = 2;
    string vm_id = 3;
    int64 cpu_time_ms = 4;
    double memory_peak_mb = 5;
    double memory_avg_mb = 6;
    int64 io_read_bytes = 7;
    int64 io_write_bytes = 8;
    int64 boot_time_ms = 9;
    int64 compile_time_ms = 10;
    int64 exec_time_ms = 11;
    int64 total_time_ms = 12;
}

// ─────────────────────────────────────────────────────────────────────
// Convenience execution messages.
// ─────────────────────────────────────────────────────────────────────

message ExecuteRequest {
    string organization_id = 1;
    string requested_by = 2;
    string language = 3;
    string code = 4;
    string stdin = 5;
    int32  timeout_sec = 6;
    int32  vcpu = 7;
    int32  memory_mb = 8;
    // Optional canvas-node id for traceability.
    string canvas_node_id = 9;
}

message ExecuteResponse {
    Execution execution = 1;
}

message ExecuteAsyncResponse {
    // job_id is the execution row id — callers poll with
    // GetExecutionStatus / GetExecutionResult.
    string job_id = 1;
    string status = 2;
}

message GetExecutionStatusRequest {
    string job_id = 1;
}

message GetExecutionStatusResponse {
    string job_id = 1;
    string status = 2;
    string created_at = 3;
    string started_at = 4;
    string completed_at = 5;
}

message GetExecutionResultRequest {
    string job_id = 1;
}

message GetExecutionResultResponse {
    string job_id = 1;
    string status = 2;
    int32  exit_code = 3;
    string stdout = 4;
    string stderr = 5;
    string error = 6;
    int64  duration_ms = 7;
}

// ─────────────────────────────────────────────────────────────────────
// Test-run dispatch + coverage.
// ─────────────────────────────────────────────────────────────────────

message DispatchTestRunRequest {
    string organization_id = 1;
    string canvas_id = 2;                // optional
    string code_node_id = 3;             // optional — node-scoped runs
    string test_node_id = 4;             // optional
    string execution_id = 5;             // optional — link to parent exec
    string language = 6;
    // test_type: "unit" | "integration" | "e2e" | "perf" | "security"
    // | "contract" | "visual" | "accessibility". Empty → "unit".
    string test_type = 7;
    int32  max_retries = 8;
    int32  timeout_sec = 9;
}

message TestRunHandle {
    string test_run_id = 1;
    string execution_id = 2;
    string status = 3;                   // "queued" | "dispatched"
    bool   runner_matched = 4;
    string command = 5;
    string vm_profile = 6;
    string network = 7;
}

message GetTestCoverageRequest {
    string test_run_id = 1;
}

message TestCoverage {
    string test_run_id = 1;
    int32  passed = 2;
    int32  failed = 3;
    int32  skipped = 4;
    double coverage_pct = 5;
    bool   has_coverage = 6;
    int64  duration_ms = 7;
    string status = 8;
}

message GetTestCoverageDeltaRequest {
    string base_test_run_id = 1;
    string head_test_run_id = 2;
}

message TestCoverageDelta {
    double base_pct = 1;
    double head_pct = 2;
    double delta_pct = 3;
    int32  base_passed = 4;
    int32  head_passed = 5;
    int32  base_failed = 6;
    int32  head_failed = 7;
    int32  new_failures = 8;              // failed at head but passing at base
    int32  fixed_failures = 9;            // passing at head but failing at base
}

// ─────────────────────────────────────────────────────────────────────
// VM usage for session cost preview.
// ─────────────────────────────────────────────────────────────────────

message GetVMUsageRequest {
    // Scope is EITHER execution_id (one run) or organization_id + window.
    string execution_id = 1;
    string organization_id = 2;
    string since = 3;                    // RFC 3339
    string until = 4;                    // RFC 3339
}

message VMUsage {
    string scope = 1;                    // "execution" | "organization"
    int64  total_cpu_time_ms = 2;
    double total_memory_mb_seconds = 3;
    int64  total_boot_time_ms = 4;
    int32  execution_count = 5;
    int32  active_vms = 6;
    // estimated_cost_usd is an optional cost projection. Zero when the
    // service is not configured with a cost model yet.
    double estimated_cost_usd = 7;
}
