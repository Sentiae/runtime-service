syntax = "proto3";

package runtime.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/sentiae/runtime-service/gen/proto/runtime/v1;runtimev1";

// GraphService is the inter-service surface canvas-service calls into
// runtime-service for graph CRUD + execution. Platform rule:
// service↔service = gRPC. Replaces the legacy REST endpoints at
// /api/v1/graphs/* and /api/v1/graph-executions/*.
//
// Caller identity travels via metadata headers:
//   x-organization-id
//   x-user-id
service GraphService {
  rpc CreateGraph(CreateGraphRequest) returns (Graph);
  rpc DeployGraph(DeployGraphRequest) returns (Graph);
  rpc GetGraph(GetGraphRequest) returns (Graph);
  rpc ListGraphs(ListGraphsRequest) returns (ListGraphsResponse);
  rpc DeleteGraph(DeleteGraphRequest) returns (DeleteGraphResponse);
  rpc ExecuteGraph(ExecuteGraphRequest) returns (GraphExecution);
  rpc GetGraphExecution(GetGraphExecutionRequest) returns (GraphExecution);
  rpc ListGraphExecutions(ListGraphExecutionsRequest) returns (ListGraphExecutionsResponse);
  rpc CancelGraphExecution(CancelGraphExecutionRequest) returns (CancelGraphExecutionResponse);
  rpc ListNodeExecutions(ListNodeExecutionsRequest) returns (ListNodeExecutionsResponse);
  rpc GetNodeExecution(GetNodeExecutionRequest) returns (NodeExecution);
}

message Graph {
  string id = 1;
  string organization_id = 2;
  string canvas_id = 3;
  string name = 4;
  string description = 5;
  int32  version = 6;
  string status = 7;
  string created_by = 8;
  string created_at = 9;             // RFC3339
  string updated_at = 10;            // RFC3339
}

message GraphNodeInput {
  string node_type = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  string language = 4;
  string code = 5;
  GraphNodeResources resources = 6;
  google.protobuf.Struct position = 7;
  int32  sort_order = 8;
}

message GraphNodeResources {
  int32 cpu_millicores = 1;
  int32 memory_mib = 2;
  int32 timeout_sec = 3;
}

message GraphEdgeInput {
  int32  source_node_index = 1;
  int32  target_node_index = 2;
  string source_port = 3;
  string target_port = 4;
  string condition_expr = 5;
}

message CreateGraphRequest {
  string name = 1;
  string description = 2;
  string canvas_id = 3;                // optional
  repeated GraphNodeInput nodes = 4;
  repeated GraphEdgeInput edges = 5;
}

message DeployGraphRequest {
  string graph_id = 1;
}

message ExecuteGraphRequest {
  string graph_id = 1;
  google.protobuf.Struct input = 2;
}

message GraphExecution {
  string id = 1;
  string graph_id = 2;
  string organization_id = 3;
  string status = 4;
  google.protobuf.Struct input = 5;
  google.protobuf.Struct output = 6;
  string error = 7;
  int32  total_nodes = 8;
  int32  completed_nodes = 9;
  int64  duration_ms = 10;
  bool   has_duration = 11;
  string requested_by = 12;
  bool   debug_mode = 13;
  string started_at = 14;            // RFC3339, empty when unset
  string completed_at = 15;          // RFC3339, empty when unset
  string created_at = 16;            // RFC3339
}

message GetGraphExecutionRequest {
  string execution_id = 1;
}

message CancelGraphExecutionRequest {
  string execution_id = 1;
}

message CancelGraphExecutionResponse {
  bool ok = 1;
}

message NodeExecution {
  string id = 1;
  string graph_execution_id = 2;
  string graph_node_id = 3;
  string node_type = 4;
  string node_name = 5;
  int32  sequence_number = 6;
  string status = 7;
  google.protobuf.Struct input = 8;
  google.protobuf.Struct output = 9;
  string error = 10;
  int64  duration_ms = 11;
  bool   has_duration = 12;
  string started_at = 13;            // RFC3339, empty when unset
  string completed_at = 14;          // RFC3339, empty when unset
  string created_at = 15;            // RFC3339
}

message ListNodeExecutionsRequest {
  string execution_id = 1;
}

message ListNodeExecutionsResponse {
  repeated NodeExecution items = 1;
}

message GetGraphRequest {
  string graph_id = 1;
}

message ListGraphsRequest {
  string organization_id = 1;        // optional — falls back to metadata
  int32  page = 2;
  int32  page_size = 3;
}

message ListGraphsResponse {
  repeated Graph items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message DeleteGraphRequest {
  string graph_id = 1;
}

message DeleteGraphResponse {
  bool ok = 1;
}

message ListGraphExecutionsRequest {
  string graph_id = 1;
  int32  page = 2;
  int32  page_size = 3;
}

message ListGraphExecutionsResponse {
  repeated GraphExecution items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetNodeExecutionRequest {
  string execution_id = 1;           // optional scope; usecase lookup by node_id
  string node_id = 2;
}
